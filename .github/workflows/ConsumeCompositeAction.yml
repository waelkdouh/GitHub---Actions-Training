name: Python CI
on:
  # Trigger is now exclusively manual via the "Run workflow" button
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        # Format: {owner}/{repo}@{ref}
        uses: ./.github/actions/python-setup
        with:
          python-version: '3.10'

      - name: Run Tests
        run: pytest
