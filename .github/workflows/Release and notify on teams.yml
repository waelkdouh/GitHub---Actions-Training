name: Deploy and Release

on:
  release:
    types: [published]

permissions:
  contents: write
  pull-requests: read

jobs:
  release-process:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. DEPLOYMENT STEP
      - name: Deploy to Production
        run: |
          echo "Deploying new version..."
          # Your deployment logic here
          
      # 2. GENERATE RELEASE NOTES
      - name: Generate Release Notes
        id: release_notes
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. NOTIFY STAKEHOLDERS (Power Automate Workflow / Adaptive Card)
      - name: Notify Stakeholders via Teams Workflow
        run: |
          curl -H 'Content-Type: application/json' \
          -d '{
            "type": "message",
            "attachments": [
              {
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "type": "AdaptiveCard",
                  "body": [
                    {
                      "type": "TextBlock",
                      "size": "Medium",
                      "weight": "Bolder",
                      "text": "🚀 New Release: ${{ github.event.release.tag_name }}"
                    },
                    {
                      "type": "FactSet",
                      "facts": [
                        { "title": "Repository:", "value": "${{ github.repository }}" },
                        { "title": "Author:", "value": "${{ github.actor }}" },
                        { "title": "Status:", "value": "Deployed to Production" }
                      ]
                    }
                  ],
                  "actions": [
                    {
                      "type": "Action.OpenUrl",
                      "title": "View Release Notes",
                      "url": "${{ github.event.release.html_url }}"
                    }
                  ],
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "version": "1.4"
                }
              }
            ]
          }' \
          ${{ secrets.TEAMS_WEBHOOK_URL }}
