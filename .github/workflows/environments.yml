name: Python Deployment Pipeline

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create deployment package
        run: |
          # Zip only the application code and dependencies — exclude tests,
          # CI/CD files, and other non-production artifacts.
          zip -r release.zip src/ requirements.txt -x "*.pyc" "__pycache__/*"

      - name: Upload artifact for deployment jobs
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: release.zip

  deploy-staging:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: https://GithubActionsWS.azurewebsites.net
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App (Staging)'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'GithubActionsWS'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip

  deploy-production:
    needs: deploy-staging
    # RESTRICTION: Must be a push to main AND the commit message must contain "Merge pull request" 
    # or follow the GitHub "Merge branch '...' of ..." pattern.
    if: |
      github.ref == 'refs/heads/main' && 
      (contains(github.event.head_commit.message, 'Merge pull request') || 
       contains(github.event.head_commit.message, 'Merge branch'))
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://GithubActionsWS-Prod.azurewebsites.net
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App (Production)'
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'GithubActionsWS-Prod'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: release.zip
